<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>로그인 / 회원가입</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #f0f4f8;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }
    .card {
      background: #fff;
      border-radius: 16px;
      box-shadow: 0 4px 24px rgba(0,0,0,0.08);
      padding: 40px;
      width: 100%;
      max-width: 420px;
    }
    h1 { font-size: 1.4rem; font-weight: 700; color: #1a202c; margin-bottom: 28px; text-align: center; }

    .tabs { display: flex; margin-bottom: 28px; border-bottom: 2px solid #e2e8f0; }
    .tab {
      flex: 1;
      text-align: center;
      padding: 10px;
      cursor: pointer;
      font-weight: 600;
      font-size: 0.95rem;
      color: #a0aec0;
      border-bottom: 2px solid transparent;
      margin-bottom: -2px;
      transition: color 0.2s, border-color 0.2s;
    }
    .tab.active { color: #4299e1; border-bottom-color: #4299e1; }

    .form-section { display: none; }
    .form-section.active { display: block; }

    label { display: block; font-size: 0.85rem; font-weight: 600; color: #4a5568; margin-bottom: 6px; }
    input[type=email], input[type=password], input[type=text] {
      width: 100%;
      padding: 10px 14px;
      border: 1px solid #e2e8f0;
      border-radius: 8px;
      font-size: 0.95rem;
      outline: none;
      margin-bottom: 16px;
    }
    input:focus { border-color: #4299e1; }

    .submit-btn {
      width: 100%;
      padding: 12px;
      background: #4299e1;
      color: #fff;
      border: none;
      border-radius: 10px;
      font-size: 1rem;
      font-weight: 700;
      cursor: pointer;
      transition: background 0.2s;
    }
    .submit-btn:hover { background: #3182ce; }
    .submit-btn:disabled { background: #a0aec0; cursor: not-allowed; }

    .error {
      display: none;
      margin-top: 12px;
      padding: 10px 14px;
      background: #fff5f5;
      border: 1px solid #fed7d7;
      border-radius: 8px;
      color: #c53030;
      font-size: 0.88rem;
    }
    .back-link {
      display: block;
      text-align: center;
      margin-top: 20px;
      font-size: 0.85rem;
      color: #718096;
      cursor: pointer;
    }
    .back-link:hover { color: #4a5568; }
  </style>
</head>
<body>
  <div class="card">
    <h1>🧊 냉장고 레시피</h1>

    <div class="tabs">
      <div class="tab active" data-tab="login">로그인</div>
      <div class="tab" data-tab="register">회원가입</div>
    </div>

    <!-- 로그인 -->
    <div class="form-section active" id="login-section">
      <label>이메일</label>
      <input type="email" id="login-email" placeholder="example@email.com" />
      <label>비밀번호</label>
      <input type="password" id="login-pw" placeholder="비밀번호 입력" />
      <button class="submit-btn" id="login-btn">로그인</button>
      <div class="error" id="login-error"></div>
    </div>

    <!-- 회원가입 -->
    <div class="form-section" id="register-section">
      <label>닉네임</label>
      <input type="text" id="reg-nickname" placeholder="표시할 이름" />
      <label>이메일</label>
      <input type="email" id="reg-email" placeholder="example@email.com" />
      <label>비밀번호</label>
      <input type="password" id="reg-pw" placeholder="6자 이상" />
      <label>비밀번호 확인</label>
      <input type="password" id="reg-pw-confirm" placeholder="비밀번호를 다시 입력해 주세요" />
      <button class="submit-btn" id="register-btn">회원가입</button>
      <div class="error" id="register-error"></div>
    </div>

    <span class="back-link" onclick="window.location.href='/'">← 홈으로</span>
  </div>

  <script>
    // 이미 로그인 상태라면 프로필로 이동
    if (localStorage.getItem('token')) window.location.href = '/profile';

    const rawRedirect = new URLSearchParams(location.search).get('redirect') || '/profile';
    // Open Redirect 방지: 같은 오리진의 경로만 허용
    const redirect = rawRedirect.startsWith('/') && !rawRedirect.startsWith('//') ? rawRedirect : '/profile';

    // 탭 전환
    document.querySelectorAll('.tab').forEach(tab => {
      tab.addEventListener('click', () => {
        document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
        document.querySelectorAll('.form-section').forEach(s => s.classList.remove('active'));
        tab.classList.add('active');
        document.getElementById(tab.dataset.tab + '-section').classList.add('active');
      });
    });

    // 로그인
    document.getElementById('login-btn').addEventListener('click', async () => {
      const email = document.getElementById('login-email').value.trim();
      const password = document.getElementById('login-pw').value;
      const errEl = document.getElementById('login-error');
      errEl.style.display = 'none';

      try {
        const res = await fetch('/api/auth/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ email, password })
        });
        const data = await res.json();
        if (!res.ok) throw new Error(data.error);
        localStorage.setItem('token', data.token);
        window.location.href = redirect;
      } catch (e) {
        errEl.textContent = e.message;
        errEl.style.display = 'block';
      }
    });

    // 비밀번호 확인 실시간 검증
    document.getElementById('reg-pw-confirm').addEventListener('input', () => {
      const pw = document.getElementById('reg-pw').value;
      const confirm = document.getElementById('reg-pw-confirm').value;
      const errEl = document.getElementById('register-error');
      if (confirm && pw !== confirm) {
        errEl.textContent = '비밀번호가 일치하지 않습니다.';
        errEl.style.display = 'block';
      } else {
        errEl.style.display = 'none';
      }
    });

    // 회원가입
    document.getElementById('register-btn').addEventListener('click', async () => {
      const nickname = document.getElementById('reg-nickname').value.trim();
      const email = document.getElementById('reg-email').value.trim();
      const password = document.getElementById('reg-pw').value;
      const passwordConfirm = document.getElementById('reg-pw-confirm').value;
      const errEl = document.getElementById('register-error');
      errEl.style.display = 'none';

      if (password.length < 6) {
        errEl.textContent = '비밀번호는 6자 이상이어야 합니다.';
        errEl.style.display = 'block';
        return;
      }

      if (password !== passwordConfirm) {
        errEl.textContent = '비밀번호가 일치하지 않습니다. 다시 확인해 주세요.';
        errEl.style.display = 'block';
        document.getElementById('reg-pw-confirm').focus();
        return;
      }

      try {
        const res = await fetch('/api/auth/register', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ email, password, nickname })
        });
        const data = await res.json();
        if (!res.ok) throw new Error(data.error);
        localStorage.setItem('token', data.token);
        window.location.href = redirect;
      } catch (e) {
        errEl.textContent = e.message;
        errEl.style.display = 'block';
      }
    });

    // Enter 키 지원
    document.addEventListener('keydown', e => {
      if (e.key !== 'Enter') return;
      const activeSection = document.querySelector('.form-section.active').id;
      if (activeSection === 'login-section') document.getElementById('login-btn').click();
      else document.getElementById('register-btn').click();
    });
  </script>
</body>
</html>
