<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>추천 레시피</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #f0f4f8;
      min-height: 100vh;
      padding: 32px 24px;
    }

    .container {
      max-width: 720px;
      margin: 0 auto;
    }

    header {
      margin-bottom: 28px;
    }
    header h1 { font-size: 1.5rem; font-weight: 700; color: #1a202c; }
    header p { margin-top: 6px; font-size: 0.9rem; color: #718096; }

    .ingredient-tags {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      margin-top: 10px;
    }
    .ingredient-tag {
      background: #ebf8ff;
      color: #2b6cb0;
      border: 1px solid #bee3f8;
      border-radius: 20px;
      padding: 4px 12px;
      font-size: 0.82rem;
    }

    /* 로딩 */
    #loading {
      text-align: center;
      padding: 60px 0;
      color: #4299e1;
      font-weight: 600;
      font-size: 1rem;
    }
    .spinner {
      display: inline-block;
      width: 28px; height: 28px;
      border: 3px solid #bee3f8;
      border-top-color: #4299e1;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin-right: 10px;
      vertical-align: middle;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* 에러 */
    #error-msg {
      display: none;
      padding: 16px;
      background: #fff5f5;
      border: 1px solid #fed7d7;
      border-radius: 10px;
      color: #c53030;
      font-size: 0.9rem;
    }

    /* 레시피 카드 그리드 */
    #recipe-grid {
      display: none;
      grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
      gap: 16px;
    }

    .recipe-card {
      background: #fff;
      border-radius: 14px;
      box-shadow: 0 2px 12px rgba(0,0,0,0.07);
      padding: 24px 20px;
      cursor: pointer;
      transition: transform 0.15s, box-shadow 0.15s;
    }
    .recipe-card:hover {
      transform: translateY(-3px);
      box-shadow: 0 6px 20px rgba(0,0,0,0.12);
    }
    .recipe-card h2 { font-size: 1.05rem; font-weight: 700; color: #2d3748; margin-bottom: 10px; }
    .recipe-meta { display: flex; gap: 10px; flex-wrap: wrap; }
    .badge {
      font-size: 0.78rem;
      padding: 3px 10px;
      border-radius: 12px;
      font-weight: 600;
    }
    .badge-time { background: #fefcbf; color: #744210; }
    .badge-easy { background: #c6f6d5; color: #22543d; }
    .badge-medium { background: #feebc8; color: #744210; }
    .badge-hard { background: #fed7d7; color: #742a2a; }

    .detail-btn {
      margin-top: 16px;
      width: 100%;
      padding: 9px;
      background: #4299e1;
      color: #fff;
      border: none;
      border-radius: 8px;
      font-size: 0.88rem;
      font-weight: 600;
      cursor: pointer;
    }
    .detail-btn:hover { background: #3182ce; }

    /* 다시 추천받기 */
    #retry-btn {
      display: none;
      margin-top: 28px;
      padding: 12px 28px;
      background: #fff;
      border: 2px solid #4299e1;
      color: #4299e1;
      border-radius: 10px;
      font-size: 0.95rem;
      font-weight: 700;
      cursor: pointer;
      transition: background 0.2s;
    }
    #retry-btn:hover { background: #ebf8ff; }
    #retry-btn:disabled { border-color: #a0aec0; color: #a0aec0; cursor: not-allowed; background: #fff; }
    #save-btn:disabled { background: #68d391; cursor: not-allowed; }
    #modal-retry-btn:disabled { opacity: 0.6; cursor: not-allowed; }

    /* 토스트 메시지 */
    #toast {
      display: none;
      position: fixed;
      bottom: 28px;
      left: 50%;
      transform: translateX(-50%);
      background: #2d3748;
      color: #fff;
      padding: 12px 24px;
      border-radius: 10px;
      font-size: 0.92rem;
      font-weight: 600;
      z-index: 200;
      box-shadow: 0 4px 16px rgba(0,0,0,0.18);
      white-space: nowrap;
    }
    #toast.error { background: #c53030; }

    /* 뒤로가기 */
    #back-btn {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      color: #718096;
      font-size: 0.88rem;
      cursor: pointer;
      margin-bottom: 20px;
      background: none;
      border: none;
    }
    #back-btn:hover { color: #4a5568; }

    /* 모달 */
    #modal-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.45);
      z-index: 100;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }
    #modal-overlay.open { display: flex; }

    #modal {
      background: #fff;
      border-radius: 16px;
      padding: 32px;
      max-width: 520px;
      width: 100%;
      max-height: 85vh;
      overflow-y: auto;
      position: relative;
    }

    #modal h2 { font-size: 1.3rem; font-weight: 700; color: #1a202c; margin-bottom: 6px; }
    #modal .modal-meta { display: flex; gap: 8px; margin-bottom: 20px; }

    #modal h3 { font-size: 0.95rem; font-weight: 700; color: #4a5568; margin: 16px 0 8px; }
    #modal ul { padding-left: 18px; }
    #modal ul li { font-size: 0.9rem; color: #4a5568; margin-bottom: 4px; }
    #modal ol { padding-left: 18px; }
    #modal ol li { font-size: 0.9rem; color: #4a5568; margin-bottom: 6px; line-height: 1.5; }

    .modal-actions {
      display: flex;
      gap: 10px;
      margin-top: 24px;
    }
    .modal-actions button {
      flex: 1;
      padding: 12px;
      border-radius: 10px;
      font-size: 0.92rem;
      font-weight: 700;
      cursor: pointer;
      border: none;
    }
    #save-btn { background: #48bb78; color: #fff; }
    #save-btn:hover { background: #38a169; }
    #modal-retry-btn { background: #edf2f7; color: #4a5568; }
    #modal-retry-btn:hover { background: #e2e8f0; }

    #modal-close {
      position: absolute;
      top: 16px; right: 20px;
      background: none;
      border: none;
      font-size: 1.4rem;
      color: #a0aec0;
      cursor: pointer;
    }
    #modal-close:hover { color: #4a5568; }
  </style>
</head>
<body>
  <div class="container">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px;">
      <button id="back-btn">← 재료 다시 선택</button>
      <button onclick="window.location.href=localStorage.getItem('token')?'/profile':'/auth'"
        style="background:none;border:none;font-size:0.88rem;color:#718096;cursor:pointer;">
        👤 내 프로필
      </button>
    </div>

    <header>
      <h1>🍳 추천 레시피</h1>
      <p>인식된 재료</p>
      <div class="ingredient-tags" id="ingredient-tags"></div>
    </header>

    <div id="loading"><span class="spinner"></span>레시피를 생성 중입니다...</div>
    <div id="error-msg"></div>
    <div id="recipe-grid"></div>
    <button id="retry-btn">🔄 다시 추천받기</button>
  </div>

  <!-- 상세 모달 -->
  <div id="modal-overlay">
    <div id="modal">
      <button id="modal-close">×</button>
      <h2 id="modal-name"></h2>
      <div class="modal-meta" id="modal-meta"></div>
      <h3>재료</h3>
      <ul id="modal-ingredients"></ul>
      <h3>조리법</h3>
      <ol id="modal-steps"></ol>
      <div class="modal-actions">
        <button id="save-btn">저장하기</button>
        <button id="modal-retry-btn">🔄 다시 추천받기</button>
      </div>
    </div>
  </div>

  <!-- 토스트 -->
  <div id="toast"></div>

  <script>
    let ingredients = [];
    let currentRecipe = null;

    // 토스트 헬퍼
    let toastTimer = null;
    function showToast(msg, isError = false) {
      const toast = document.getElementById('toast');
      toast.textContent = msg;
      toast.className = isError ? 'error' : '';
      toast.style.display = 'block';
      if (toastTimer) clearTimeout(toastTimer);
      toastTimer = setTimeout(() => { toast.style.display = 'none'; }, 3000);
    }

    // 재료 불러오기
    const stored = sessionStorage.getItem('ingredients');
    if (!stored) {
      window.location.href = '/';
    } else {
      ingredients = JSON.parse(stored);
      renderIngredientTags();
      fetchRecipes();
    }

    // 로그인 후 pendingRecipe 자동 저장
    const token = localStorage.getItem('token');
    const pendingRaw = sessionStorage.getItem('pendingRecipe');
    if (token && pendingRaw) {
      sessionStorage.removeItem('pendingRecipe');
      (async () => {
        try {
          const pending = JSON.parse(pendingRaw);
          const res = await fetch('/api/recipes/saved', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${token}` },
            body: JSON.stringify(pending)
          });
          const data = await res.json();
          if (!res.ok) throw new Error(data.error);
          showToast('이전에 보던 레시피를 저장했습니다!');
        } catch (e) {
          showToast('이전 레시피 저장에 실패했습니다: ' + e.message, true);
        }
      })();
    }

    document.getElementById('back-btn').addEventListener('click', () => {
      window.location.href = '/';
    });

    // XSS 방지: createElement + textContent 사용
    function renderIngredientTags() {
      const el = document.getElementById('ingredient-tags');
      el.innerHTML = '';
      ingredients.forEach(i => {
        const span = document.createElement('span');
        span.className = 'ingredient-tag';
        span.textContent = i;
        el.appendChild(span);
      });
    }

    async function fetchRecipes() {
      const retryBtn = document.getElementById('retry-btn');
      const modalRetryBtn = document.getElementById('modal-retry-btn');
      document.getElementById('loading').style.display = 'block';
      document.getElementById('recipe-grid').style.display = 'none';
      retryBtn.style.display = 'none';
      document.getElementById('error-msg').style.display = 'none';

      // 중복 클릭 방지
      retryBtn.disabled = true;
      retryBtn.textContent = '레시피 생성 중...';
      modalRetryBtn.disabled = true;

      try {
        const fetchToken = localStorage.getItem('token');
        const fetchHeaders = { 'Content-Type': 'application/json' };
        if (fetchToken) fetchHeaders['Authorization'] = `Bearer ${fetchToken}`;
        const res = await fetch('/api/recipes', {
          method: 'POST',
          headers: fetchHeaders,
          body: JSON.stringify({ ingredients })
        });
        const data = await res.json();
        if (!res.ok || data.error) throw new Error(data.error || '레시피 생성 실패');
        renderRecipes(data.recipes);
      } catch (e) {
        document.getElementById('error-msg').textContent = e.message;
        document.getElementById('error-msg').style.display = 'block';
      } finally {
        document.getElementById('loading').style.display = 'none';
        retryBtn.style.display = 'inline-block';
        retryBtn.disabled = false;
        retryBtn.textContent = '🔄 다시 추천받기';
        modalRetryBtn.disabled = false;
      }
    }

    // XSS 방지: createElement + textContent 사용
    function renderRecipes(recipes) {
      const grid = document.getElementById('recipe-grid');
      grid.innerHTML = '';
      recipes.forEach(recipe => {
        const diffClass = recipe.difficulty === '쉬움' ? 'badge-easy'
                        : recipe.difficulty === '어려움' ? 'badge-hard' : 'badge-medium';
        const card = document.createElement('div');
        card.className = 'recipe-card';

        const h2 = document.createElement('h2');
        h2.textContent = recipe.name;

        const meta = document.createElement('div');
        meta.className = 'recipe-meta';

        const timeBadge = document.createElement('span');
        timeBadge.className = 'badge badge-time';
        timeBadge.textContent = `⏱ ${recipe.time}분`;

        const diffBadge = document.createElement('span');
        diffBadge.className = `badge ${diffClass}`;
        diffBadge.textContent = recipe.difficulty;

        meta.appendChild(timeBadge);
        meta.appendChild(diffBadge);

        const btn = document.createElement('button');
        btn.className = 'detail-btn';
        btn.textContent = '상세보기';
        btn.addEventListener('click', () => openModal(recipe));

        card.appendChild(h2);
        card.appendChild(meta);
        card.appendChild(btn);
        grid.appendChild(card);
      });
      grid.style.display = 'grid';
    }

    // XSS 방지: createElement + textContent 사용
    function openModal(recipe) {
      currentRecipe = recipe;
      document.getElementById('modal-name').textContent = recipe.name;

      const diffClass = recipe.difficulty === '쉬움' ? 'badge-easy'
                      : recipe.difficulty === '어려움' ? 'badge-hard' : 'badge-medium';

      const modalMeta = document.getElementById('modal-meta');
      modalMeta.innerHTML = '';
      const timeBadge = document.createElement('span');
      timeBadge.className = 'badge badge-time';
      timeBadge.textContent = `⏱ ${recipe.time}분`;
      const diffBadge = document.createElement('span');
      diffBadge.className = `badge ${diffClass}`;
      diffBadge.textContent = recipe.difficulty;
      modalMeta.appendChild(timeBadge);
      modalMeta.appendChild(diffBadge);

      const ingList = document.getElementById('modal-ingredients');
      ingList.innerHTML = '';
      recipe.ingredients.forEach(i => {
        const li = document.createElement('li');
        li.textContent = i;
        ingList.appendChild(li);
      });

      const stepList = document.getElementById('modal-steps');
      stepList.innerHTML = '';
      recipe.steps.forEach(s => {
        const li = document.createElement('li');
        li.textContent = s.replace(/^\d+\.\s*/, '');
        stepList.appendChild(li);
      });

      document.getElementById('modal-overlay').classList.add('open');
    }

    function closeModal() {
      document.getElementById('modal-overlay').classList.remove('open');
      const saveBtn = document.getElementById('save-btn');
      saveBtn.disabled = false;
      saveBtn.textContent = '저장하기';
    }

    document.getElementById('modal-close').addEventListener('click', closeModal);
    document.getElementById('modal-overlay').addEventListener('click', e => {
      if (e.target === document.getElementById('modal-overlay')) closeModal();
    });

    // ESC 키로 모달 닫기
    document.addEventListener('keydown', e => {
      if (e.key === 'Escape') closeModal();
    });

    document.getElementById('retry-btn').addEventListener('click', fetchRecipes);
    document.getElementById('modal-retry-btn').addEventListener('click', () => {
      closeModal();
      fetchRecipes();
    });

    document.getElementById('save-btn').addEventListener('click', async () => {
      if (!currentRecipe) return;
      const saveToken = localStorage.getItem('token');
      if (!saveToken) {
        sessionStorage.setItem('pendingRecipe', JSON.stringify(currentRecipe));
        window.location.href = '/auth?redirect=/recipes';
        return;
      }
      const saveBtn = document.getElementById('save-btn');
      saveBtn.disabled = true;
      saveBtn.textContent = '저장 중...';
      try {
        const res = await fetch('/api/recipes/saved', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${saveToken}` },
          body: JSON.stringify(currentRecipe)
        });
        const data = await res.json();
        if (!res.ok) throw new Error(data.error);
        closeModal();
        showToast(`"${currentRecipe.name}" 저장 완료! 프로필에서 확인할 수 있습니다.`);
      } catch (e) {
        showToast(e.message, true);
        saveBtn.disabled = false;
        saveBtn.textContent = '저장하기';
      }
    });
  </script>
</body>
</html>
