<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>할 일 관리</title>
  <style>
    :root {
      --color-work: #3B82F6;
      --color-personal: #22C55E;
      --color-study: #F97316;
      --color-primary: #1F4E79;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Segoe UI', sans-serif; background: #F1F5F9; color: #1E293B; padding: 24px 16px; }
    .container { max-width: 680px; margin: 0 auto; }
    header { margin-bottom: 20px; }
    header h1 { font-size: 1.8rem; color: var(--color-primary); }
    header #today-date { font-size: 0.9rem; color: #64748B; margin-top: 4px; }
    #progress-section { margin-bottom: 20px; }
    #progress-text { font-size: 0.85rem; color: #64748B; margin-bottom: 4px; }
    #progress-bar { background: #E5E7EB; border-radius: 10px; height: 10px; overflow: hidden; margin: 8px 0; }
    #progress-fill { height: 100%; width: 0%; background: var(--color-primary); border-radius: 10px; transition: width 0.4s ease, background 0.4s ease; }
    .input-section { display: flex; gap: 8px; margin-bottom: 16px; }
    #todo-input { flex: 1; padding: 10px 14px; border: 1px solid #CBD5E1; border-radius: 8px; font-size: 0.95rem; outline: none; }
    #todo-input:focus { border-color: var(--color-primary); }
    #category-select { padding: 10px; border: 1px solid #CBD5E1; border-radius: 8px; font-size: 0.9rem; outline: none; cursor: pointer; }
    #add-btn { padding: 10px 18px; background: var(--color-primary); color: #fff; border: none; border-radius: 8px; font-size: 0.95rem; cursor: pointer; }
    #add-btn:hover { opacity: 0.88; }
    .filter-section { display: flex; gap: 8px; margin-bottom: 16px; }
    .tab-btn { padding: 7px 16px; border: none; background: none; font-size: 0.9rem; cursor: pointer; color: #475569; }
    .tab-btn.active { background: var(--color-primary); color: white; border-radius: 20px; }
    .badge { display: inline-block; font-size: 12px; font-weight: 600; padding: 2px 8px; border-radius: 4px; color: #fff; white-space: nowrap; }
    .empty-msg { text-align: center; padding: 40px 0; color: #94A3B8; font-size: 1rem; }
    #todo-list { list-style: none; display: flex; flex-direction: column; gap: 10px; margin-bottom: 24px; }
    .todo-card { display: flex; align-items: center; gap: 12px; background: #fff; padding: 14px 16px; border-radius: 8px; box-shadow: 0 1px 4px rgba(0,0,0,0.08); border-left: 4px solid transparent; }
    .todo-card[data-category="work"]     { border-left-color: var(--color-work); }
    .todo-card[data-category="personal"] { border-left-color: var(--color-personal); }
    .todo-card[data-category="study"]    { border-left-color: var(--color-study); }
    .todo-card input[type="checkbox"] { width: 18px; height: 18px; cursor: pointer; }
    .todo-card .todo-text { flex: 1; font-size: 0.95rem; }
    .todo-card .editable { cursor: pointer; }
    .todo-card .editable:hover { text-decoration: underline dotted #94A3B8; }
    .edit-input { flex: 1; font-size: 0.95rem; border: 1px solid var(--color-primary); border-radius: 4px; padding: 2px 6px; outline: none; }
    .todo-card.completed .todo-text { text-decoration: line-through; opacity: 0.5; }
    .todo-card .delete-btn { background: none; border: none; color: #94A3B8; font-size: 1.1rem; cursor: pointer; padding: 2px 6px; border-radius: 4px; }
    .todo-card .delete-btn:hover { color: #EF4444; }
    footer { text-align: center; }
    #clear-completed { padding: 9px 20px; background: none; border: 1px solid #CBD5E1; border-radius: 8px; color: #64748B; font-size: 0.9rem; cursor: pointer; }
    #clear-completed:hover { background: #FEE2E2; border-color: #EF4444; color: #EF4444; }
    @media (max-width: 600px) {
      body { padding: 12px; }
      .input-section { flex-direction: column; gap: 8px; }
      #add-btn { width: 100%; }
      .filter-section { flex-wrap: wrap; }
    }
  </style>
</head>
<body>
  <div class="container">
    <header>
      <h1>할 일 관리</h1>
      <p id="today-date"></p>
    </header>

    <section id="progress-section">
      <div id="progress-text"></div>
      <div id="progress-bar">
        <div id="progress-fill"></div>
      </div>
    </section>

    <section class="input-section">
      <input type="text" id="todo-input" placeholder="할 일을 입력하세요...">
      <select id="category-select">
        <option value="work">업무</option>
        <option value="personal">개인</option>
        <option value="study">공부</option>
      </select>
      <button id="add-btn">추가</button>
    </section>

    <section class="filter-section">
      <button class="tab-btn active" data-category="all">전체</button>
      <button class="tab-btn" data-category="work">업무</button>
      <button class="tab-btn" data-category="personal">개인</button>
      <button class="tab-btn" data-category="study">공부</button>
    </section>

    <ul id="todo-list"></ul>

    <footer>
      <button id="clear-completed">완료 항목 삭제</button>
    </footer>
  </div>

  <script>
    const STORAGE_KEY = 'todo-app-data';

    const CATEGORIES = {
      work:     { label: '업무', color: 'var(--color-work)' },
      personal: { label: '개인', color: 'var(--color-personal)' },
      study:    { label: '공부', color: 'var(--color-study)' },
    };

    const state = { todos: [], currentFilter: 'all' };

    function loadFromStorage() {
      try {
        const raw = localStorage.getItem(STORAGE_KEY);
        if (!raw) return [];
        const parsed = JSON.parse(raw);
        return Array.isArray(parsed) ? parsed.filter((t) => t.id && t.text && t.category) : [];
      } catch (e) { return []; }
    }

    function saveToStorage() {
      try { localStorage.setItem(STORAGE_KEY, JSON.stringify(state.todos)); }
      catch (e) { console.warn('저장 실패:', e); }
    }

    function renderTodos() {
      const list = document.getElementById('todo-list');
      const filtered = state.currentFilter === 'all'
        ? state.todos
        : state.todos.filter((t) => t.category === state.currentFilter);
      const sorted = [...filtered.filter((t) => !t.completed), ...filtered.filter((t) => t.completed)];

      if (sorted.length === 0) {
        const msg = state.currentFilter === 'all'
          ? '+ 버튼으로 첫 할 일을 추가하세요!'
          : '이 카테고리에 할 일이 없어요.';
        list.innerHTML = `<li class="empty-msg">${msg}</li>`;
        return;
      }

      list.innerHTML = sorted.map((todo) => `
        <li class="todo-card${todo.completed ? ' completed' : ''}" data-id="${todo.id}" data-category="${todo.category}">
          <input type="checkbox" data-id="${todo.id}" ${todo.completed ? 'checked' : ''} aria-label="완료 표시">
          <span class="badge" style="background: ${CATEGORIES[todo.category].color}">${CATEGORIES[todo.category].label}</span>
          <span class="todo-text editable" data-id="${todo.id}">${todo.text}</span>
          <button class="delete-btn" data-id="${todo.id}" aria-label="삭제">✕</button>
        </li>
      `).join('');
    }

    function renderProgress() {
      const total = state.todos.length;
      const done = state.todos.filter((t) => t.completed).length;
      const percent = total === 0 ? 0 : Math.round((done / total) * 100);
      const fill = document.getElementById('progress-fill');
      fill.style.width = `${percent}%`;
      const allDone = percent === 100 && total > 0;
      fill.style.background = allDone ? '#22C55E' : 'var(--color-primary)';
      document.getElementById('progress-text').textContent =
        `${done} / ${total} 완료 (${percent}%)${allDone ? ' 🎉 모두 완료!' : ''}`;
    }

    function addTodo() {
      const input = document.getElementById('todo-input');
      const text = input.value.trim().slice(0, 100);
      if (!text) { input.focus(); return; }
      state.todos.unshift({ id: crypto.randomUUID(), text, category: document.getElementById('category-select').value, completed: false, createdAt: Date.now() });
      input.value = '';
      saveToStorage(); renderTodos(); renderProgress();
    }

    function toggleTodo(id) {
      const todo = state.todos.find((t) => t.id === id);
      if (todo) todo.completed = !todo.completed;
      saveToStorage(); renderTodos(); renderProgress();
    }

    function deleteTodo(id) {
      state.todos = state.todos.filter((t) => t.id !== id);
      saveToStorage(); renderTodos(); renderProgress();
    }

    function updateTodo(id, newText) {
      if (!newText) return;
      const todo = state.todos.find((t) => t.id === id);
      if (todo) todo.text = newText.slice(0, 100);
      saveToStorage(); renderTodos();
    }

    function editTodo(id) {
      const li = document.querySelector(`#todo-list li[data-id="${id}"]`);
      if (!li) return;
      const textSpan = li.querySelector('.todo-text');
      const original = state.todos.find((t) => t.id === id)?.text;
      if (original === undefined) return;

      const input = document.createElement('input');
      input.type = 'text'; input.value = original; input.className = 'edit-input'; input.maxLength = 100;
      textSpan.replaceWith(input); input.focus(); input.select();

      let committed = false;
      function commit() {
        if (committed) return; committed = true;
        const newText = input.value.trim();
        if (newText) updateTodo(id, newText); else renderTodos();
      }
      function cancel() { if (committed) return; committed = true; renderTodos(); }
      input.addEventListener('keydown', (e) => { if (e.key === 'Enter') { e.preventDefault(); commit(); } if (e.key === 'Escape') cancel(); });
      input.addEventListener('blur', commit);
    }

    function setFilter(category) {
      state.currentFilter = category;
      document.querySelectorAll('.tab-btn').forEach((btn) => btn.classList.toggle('active', btn.dataset.category === category));
      renderTodos();
    }

    function init() {
      const dateEl = document.getElementById('today-date');
      if (dateEl) dateEl.textContent = new Date().toLocaleDateString('ko-KR', { year: 'numeric', month: 'long', day: 'numeric', weekday: 'long' });

      state.todos = loadFromStorage();

      document.getElementById('add-btn').addEventListener('click', addTodo);
      document.getElementById('todo-input').addEventListener('keydown', (e) => { if (e.key === 'Enter') addTodo(); });

      document.getElementById('todo-list').addEventListener('click', (e) => {
        const checkbox = e.target.closest('input[type="checkbox"]');
        if (checkbox) { toggleTodo(checkbox.dataset.id); return; }
        const deleteBtn = e.target.closest('.delete-btn');
        if (deleteBtn) { deleteTodo(deleteBtn.dataset.id); return; }
      });

      document.getElementById('todo-list').addEventListener('dblclick', (e) => {
        const textSpan = e.target.closest('.editable');
        if (textSpan) editTodo(textSpan.dataset.id);
      });

      document.querySelectorAll('.tab-btn').forEach((btn) => btn.addEventListener('click', () => setFilter(btn.dataset.category)));

      document.getElementById('clear-completed').addEventListener('click', () => {
        state.todos = state.todos.filter((t) => !t.completed);
        saveToStorage(); renderTodos(); renderProgress();
      });

      renderTodos(); renderProgress();
    }

    document.addEventListener('DOMContentLoaded', init);
  </script>
</body>
</html>
