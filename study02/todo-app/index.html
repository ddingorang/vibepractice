<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>할 일 관리</title>
  <link rel="stylesheet" href="styles.css">
  <script src="app.js" defer></script>
</head>
<body>
  <div class="container">
    <header>
      <div class="header-top">
        <h1>할 일 관리</h1>
        <button id="theme-toggle" aria-label="다크 모드 전환">🌙</button>
      </div>
      <p id="today-date"></p>
    </header>

    <section id="progress-section">
      <div id="progress-text"></div>
      <div id="progress-bar">
        <div id="progress-fill"></div>
      </div>
    </section>

    <section class="input-section">
      <input type="text" id="todo-input" placeholder="할 일을 입력하세요">
      <select id="category-select">
        <option value="work">업무</option>
        <option value="personal">개인</option>
        <option value="study">공부</option>
      </select>
      <button id="add-btn">추가</button>
    </section>

    <section class="filter-section">
      <button class="tab-btn active" data-category="all">전체</button>
      <button class="tab-btn" data-category="work">업무</button>
      <button class="tab-btn" data-category="personal">개인</button>
      <button class="tab-btn" data-category="study">공부</button>
    </section>

    <ul id="todo-list"></ul>

    <footer>
      <button id="clear-completed">완료 항목 삭제</button>
      <button id="export-btn">JSON으로 내보내기</button>
    </footer>
  </div>
</body>
</html>
